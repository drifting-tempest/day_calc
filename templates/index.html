<!DOCTYPE html>
<html lang = "en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Days Calculator</title>
    <link rel="stylesheet" href="/static/styles/style.css">
</head>

<body>

    <div id="confetti"></div>

    <div class="container">
        <h>Number of Days Between 2 Dates:</h>
        <p>Enter two dates in the dd/mm/yyyy format to get the number of days between them!</p>

        <form action="/calculate" method="post">

            <div class="input-group">
                <label for="date1">First Date</label>
                <input type="text" name="date1" id="date1" placeholder="01/01/2000" required maxlength="10" pattern="\d{2}/\d{2}/\d{4}">
            </div>

            <div class="input-group">
                <label for="date2">Second Date</label>
                <input type="text" name="date2" id="date2" placeholder="01/01/2000" required maxlength="10" pattern="\d{2}/\d{2}/\d{4}">
            </div>


            <button class="submit-btn">
                <span>Calculate the Days!</span>
            </button>
        </form>

        <div id="result">{{RESULT}}</div>
        
    </div> 

    <script>
        //WHY AM I USING SO MUCH JS FOR CONFETTI OH MY DAYS

        function launchConfetti() {
            let canvas = document.getElementById("confetti-canvas");
            if(!canvas) {
                canvas = document.createElement("canvas")
                canvas.id = "confetti-canvas";
                canvas.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:99999;pointer-events:none;"
                document.body.appendChild(canvas)
            }

            const ctx = canvas.getContext("2d");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const confetti = [];
            const colors = ["#d7fff1", "#aafcb8", "#8cd790", "#77af9c", "#285943", "#4adbc5", "#6ee7b7", "#3aa97a", "#2b8b5f"];

            for (let i = 0; i < 100; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: -10,
                    w: Math.random() * 8 + 4,
                    h: Math.random() * 12 + 6,
                    c: colors[Math.floor(Math.random() * colors.length)],
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * 3 + 2,
                    rot: Math.random() * 360,
                    spin: Math.random() * 10 + 5
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                confetti.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1; 
                    p.rot += p.spin //spent so much time on this logic stuff, i thought rot meant brainrot

                    ctx.save();
                    ctx.translate(p.x,p.y);
                    ctx.rotate(p.rot*Math.PI/180);
                    ctx.fillStyle = p.c;

                    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); 
                    ctx.restore();

                    if (p.y > canvas.height+20) {
                        confetti.splice(i, 1);
                    }
                });

                if (confetti.length > 0) {
                    requestAnimationFrame(animate);
                }
                else {
                    canvas.remove();
                }
             }

             animate();
        }

        const resultE1 = document.getElementById("result");
        function checkResult() {
            if (resultE1.textContent.includes("Days between dates")) {
                launchConfetti();
            }
        }

        checkResult();
        new MutationObserver(checkResult).observe(resultE1, {childList: true, subtree: true});
    </script>

</body>
</html>
