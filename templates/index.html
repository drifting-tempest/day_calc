<!DOCTYPE html>
<html lang = "en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Days Calculator</title>
    <link rel="stylesheet" href="/static/styles/style.css">
</head>

<body>

    <div id="confetti"></div>

    <div class="container">
        <h>Number of Days Between 2 Dates:</h>
        <p>Enter two dates in the dd/mm/yyyy format to get the number of days between them!</p>

        <form action="/calculate" method="post">

            <div class="input-group">
                <label for="date1">First Date</label>
                <input type="text" name="date1" id="date1" placeholder="01/01/2000" required maxlength="10" pattern="\d{2}/\d{2}/\d{4}">
            </div>

            <div class="input-group">
                <label for="date2">Second Date</label>
                <input type="text" name="date2" id="date2" placeholder="01/01/2000" required maxlength="10" pattern="\d{2}/\d{2}/\d{4}">
            </div>


            <button class="submit-btn">
                <span>Calculate the Days!</span>
            </button>
        </form>

        <div id="result">{{RESULT}}</div>

    </div> 

    <script>
        function spawnConfetti() {
            const confetti = document.getElementById("confetti");

            confetti.classList.add("show");
            confetti.innerHTML = "";

            const emojis = ["⭐", "✨", "🌟"];
            const numPieces = 20;

            for (let i = 0; i < numPieces; i++) {
                const piece = document.createElement("span");
                piece.classList.add("emoji");

                piece.textContent = emojis[Math.floor(Math.random() * emojis.length)];

                piece.style.left = Math.random() * 100 + "%";
                const duration = Math.random() * 3 + 2;
                piece.style.animation = `fall ${duration}s linear forwards`;

                const drift = Math.random() * 200 - 100; 
                piece.style.setProperty("--drift", drift + "px");


                piece.style.left = Math.random() * 100 + "%";
                piece.style.animation = `fall ${Math.random()*4 + 2}s linear forwards`;

                confetti.appendChild(piece);
            }

            setTimeout(() => {
                confetti.classList.remove("show");
                confetti.innerHTML = "";
            }, 4000);
        }


        (function () {
            const resultEl = document.getElementById("result");

            const observer = new MutationObserver(() => {
                if (resultEl.textContent.trim() !== "") {
                    spawnConfetti();
                }
            });

            observer.observe(resultEl, { childList: true });
        })();

        window.addEventListener("load", () => {
            const resultEl = document.getElementById("result");
            if (resultEl && resultEl.textContent.trim() !== "") {
                spawnConfetti();
            }
        });   
    </script>

</body>
</html>
